
<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markus 50er</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>🎉 Markus 50er 🎉</h1>
        <p>Willkommen in der Bildergalerie</p>
    </header>

    <main>

        <section class="login">
            <h2>Zugang</h2>
            <input type="password" id="code" placeholder="Einladungscode eingeben">
            <button>Anmelden</button>
        </section>

        <section class="upload">
    <h2>📸 Bilder hochladen</h2>

    <input type="file" id="bilderDateien" multiple accept="image/*">

    <button id="uploadButton">
        Bilder hochladen
    </button>
</section>

        <section class="gallery">
            <h2>Galerie</h2>

            <div class="bilder" id="galerie">
    <p>Noch keine Bilder vorhanden.</p>
</div>

        </section>

    </main>

    <script src="script.js"></script>

</body>
</html>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="script.js"></script>

</body>
</html>
